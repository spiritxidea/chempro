name: Build and deploy Node.js app to Azure Web App - chempro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install and build
        run: |
          npm ci
          npm run build --if-present
          npm run test --if-present

      - name: Zip artifact
        run: |
          zip -r release.zip . \
            -x ".git/*" ".github/*" "node_modules/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'chempro'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CHEMPRO }}
          package: release.zip
